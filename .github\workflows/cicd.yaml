name: MedeX CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # -------------------------------
    # Checkout code
    # -------------------------------
    - name: Checkout Code
      uses: actions/checkout@v4

    # -------------------------------
    # Setup Python (optional check)
    # -------------------------------
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install Dependencies
      run: |
        pip install -r requirements.txt

    - name: Basic Check
      run: |
        python -c "print('Build Successful')"

    # -------------------------------
    # Configure AWS
    # -------------------------------
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

    # -------------------------------
    # Login to ECR
    # -------------------------------
    - name: Login to Amazon ECR
      uses: aws-actions/amazon-ecr-login@v2

    # -------------------------------
    # Build Docker Image
    # -------------------------------
    - name: Build Docker Image
      run: |
        docker build -t medex-chatbot .

    # -------------------------------
    # Tag Image
    # -------------------------------
    - name: Tag Docker Image
      run: |
        docker tag medex-chatbot:latest ${{ secrets.ECR_REPO }}:latest

    # -------------------------------
    # Push Image
    # -------------------------------
    - name: Push to ECR
      run: |
        docker push ${{ secrets.ECR_REPO }}:latest

    # -------------------------------
    # Deploy to EC2
    # -------------------------------
    - name: Deploy on EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          docker pull ${{ secrets.ECR_REPO }}:latest

          docker stop medex-container || true
          docker rm medex-container || true

          docker run -d -p 8080:8080 \
            --name medex-container \
            -e PINECONE_API_KEY=${{ secrets.PINECONE_API_KEY }} \
            -e OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }} \
            ${{ secrets.ECR_REPO }}:latest