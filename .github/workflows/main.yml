name: MedeX CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:

  # ===============================
  # 🚧 BUILD & PUSH (CI)
  # ===============================
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Basic Check
        run: python -c "print('Build OK')"

      # AWS Login
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      # Login to ECR
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # Build + Push Docker Image
      - name: Build, Tag & Push
        env:
          ECR_REPO: ${{ secrets.ECR_REPO }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REPO:$IMAGE_TAG .
          docker push $ECR_REPO:$IMAGE_TAG


  # ===============================
  # 🚀 DEPLOY (CD)
  # ===============================
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: "${{ secrets.EC2_HOST }}"
          username: ubuntu
          key: "${{ secrets.EC2_SSH_KEY }}"
          port: 22
          script: |

            echo "🚀 Starting Deployment..."

            # Install AWS CLI (Ubuntu 24 fix)
            if ! command -v aws &> /dev/null
            then
              sudo apt update -y
              sudo apt install unzip curl -y
              curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
              unzip awscliv2.zip
              sudo ./aws/install
            fi

            # Install Docker if missing
            if ! command -v docker &> /dev/null
            then
              sudo apt install docker.io -y
              sudo usermod -aG docker ubuntu
            fi

            # Login to ECR
            aws ecr get-login-password --region ${{ secrets.AWS_DEFAULT_REGION }} | docker login --username AWS --password-stdin ${{ secrets.ECR_REPO }}

            # Pull latest image
            docker pull ${{ secrets.ECR_REPO }}:${{ github.sha }}

            # Restart container
            docker stop medex-container || true
            docker rm medex-container || true

            docker run -d -p 8080:8080 \
              --name medex-container \
              -e PINECONE_API_KEY=${{ secrets.PINECONE_API_KEY }} \
              -e OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }} \
              ${{ secrets.ECR_REPO }}:${{ github.sha }}

            echo "✅ Deployment Completed"