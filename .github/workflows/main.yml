name: MedeX CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install Dependencies
      run: |
        pip install -r requirements.txt

    - name: Basic Check
      run: |
        python -c "print('Build Successful')"

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

    - name: Login to Amazon ECR
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build Docker Image
      run: docker build -t medex-chatbot .

    - name: Tag Docker Image
      run: docker tag medex-chatbot:latest ${{ secrets.ECR_REPO }}:${{ github.sha }}

    - name: Push to ECR
      run: docker push ${{ secrets.ECR_REPO }}:${{ github.sha }}

    # -------------------------------
    # 🔍 DEBUG (TEMP - REMOVE LATER)
    # -------------------------------
    - name: Debug EC2 Host
      run: echo "HOST='${{ secrets.EC2_HOST }}'"

    # -------------------------------
    # 🚀 Deploy
    # -------------------------------
    - name: Deploy on EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: "${{ secrets.EC2_HOST }}"   # ✅ FORCE STRING (CRITICAL FIX)
        username: "ubuntu"
        key: "${{ secrets.EC2_SSH_KEY }}" # ✅ ALSO QUOTED
        port: "22"
        script: |
          aws ecr get-login-password --region ${{ secrets.AWS_DEFAULT_REGION }} | docker login --username AWS --password-stdin ${{ secrets.ECR_REPO }}

          docker pull ${{ secrets.ECR_REPO }}:${{ github.sha }}

          docker stop medex-container || true
          docker rm medex-container || true

          docker run -d -p 8080:8080 \
            --name medex-container \
            -e PINECONE_API_KEY=${{ secrets.PINECONE_API_KEY }} \
            -e OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }} \
            ${{ secrets.ECR_REPO }}:${{ github.sha }}